name: Deploy Next.js site to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and let the deploy action mint an id-token.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install pnpm first (reads the version from package.json "packageManager").
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Sets up the Pages environment. We manage basePath / output:export /
      # image optimization ourselves in next.config.ts, so NO static_site_generator here.
      - uses: actions/configure-pages@v5

      - run: pnpm install --frozen-lockfile

      # MUST use the project script: `next build --webpack`. The --webpack flag is
      # required for the Velite content build (VeliteWebpackPlugin); plain
      # `next build` uses Turbopack and would skip it.
      - run: pnpm run build

      # Belt-and-braces against Jekyll touching the _next/ folder.
      - run: touch ./out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
